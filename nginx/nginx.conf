# nginx/nginx.conf
events {
    worker_connections 1024;
}

http {
    upstream auth {
        server auth-service:5000;
    }

    upstream movies {
        server movie-service:5000;
    }

    upstream bookings {
        server booking-service:5000;
    }

    server {
        listen 80;

        # Auth service routes
        location /auth/ {
            rewrite ^/auth/(.*) /$1 break;
            proxy_pass http://auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Movie service routes
        location /movies/ {
            rewrite ^/movies/(.*) /$1 break;
            proxy_pass http://movies;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Booking service routes
        location /bookings/ {
            rewrite ^/bookings/(.*) /$1 break;
            proxy_pass http://bookings;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static files for movie posters
        location /uploads/ {
            proxy_pass http://movies/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
