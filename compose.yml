# docker-compose.yml
version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moviebooking
      MYSQL_USER: movieuser
      MYSQL_PASSWORD: moviepass
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    networks:
      - movie-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "5001:5000"
    environment:
      DB_HOST: mysql-db
      DB_USER: movieuser
      DB_PASSWORD: moviepass
      DB_NAME: moviebooking
    depends_on:
      - mysql-db
    networks:
      - movie-network

  movie-service:
    build: ./movie-service
    container_name: movie-service
    ports:
      - "5002:5000"
    environment:
      DB_HOST: mysql-db
      DB_USER: movieuser
      DB_PASSWORD: moviepass
      DB_NAME: moviebooking
    depends_on:
      - mysql-db
    volumes:
      - ./static/uploads:/app/uploads
    networks:
      - movie-network

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "5003:5000"
    environment:
      DB_HOST: mysql-db
      DB_USER: movieuser
      DB_PASSWORD: moviepass
      DB_NAME: moviebooking
    depends_on:
      - mysql-db
    networks:
      - movie-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service
      - movie-service
      - booking-service
    networks:
      - movie-network

volumes:
  mysql-data:

networks:
  movie-network:
    driver: bridge
